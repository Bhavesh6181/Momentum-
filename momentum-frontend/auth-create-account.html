<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

                        "on-surface-variant": "#c8c4d7",
                        "error": "#ffb4ab",

                        "on-primary": "#2900a0",
                        "surface-dim": "#121319",

                        "tertiary-container": "#ac5d00",

                        "on-secondary": "#003918"
                    },
                    "borderRadius": {

                    },
                    "spacing": {

                    "fontFamily": {
                        "stats-md": ["JetBrains Mono"],

                    },
                    "fontSize": {
                        "stats-md": ["18px", {"lineHeight": "1", "letterSpacing": "0em", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg": ["36px", {"lineHeight": "1.1", "letterSpacing": "-0.03em", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .ease-out-expo { transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
        
        .floating-label-group { position: relative; }
        .floating-label-group input { 
            background: #131318;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem 1rem 0.5rem 1rem;
            width: 100%;
            outline: none;
            transition: border-color 300ms ease-out-expo, box-shadow 300ms ease-out-expo;
        }
        .floating-label-group input:focus { 
            border-color: #6C5CE7;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.2);
        }
        .floating-label-group label {
            position: absolute;
            top: 1rem;
            left: 1rem;
            pointer-events: none;
            transition: all 200ms ease-out-expo;
            color: #c8c4d7;
            font-size: 14px;
        }
        .floating-label-group input:focus ~ label,
        .floating-label-group input:not(:placeholder-shown) ~ label {
            top: 0.5rem;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6C5CE7;
        }

        @keyframes flash-settle {
            0% { background-color: rgba(0, 230, 118, 0.4); }
            100% { background-color: transparent; }
        }
        .flash-animation {
            animation: flash-settle 600ms ease-out-expo forwards;
        }

        .scroll-container {
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        @keyframes scroll-up {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }
        .scrolling-content {
            animation: scroll-up 40s linear infinite;
        }

        .hairline-card {
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 100%);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-lg antialiased selection:bg-primary-container selection:text-white">
<main class="min-h-screen flex flex-col md:flex-row overflow-hidden">
<!-- Left Side: Form (55%) -->
<section class="w-full md:w-[55%] flex flex-col p-8 md:p-12 lg:px-24 xl:px-32 relative z-10 bg-background">
<!-- Wordmark -->
<div class="mb-12">
<span class="text-label-caps font-label-caps tracking-[0.2em] text-on-surface uppercase">Momentum</span>
</div>
<!-- Minimal Stepper -->
<nav class="mb-16 w-full">
<div class="flex justify-between mb-2">
<span class="text-[10px] uppercase tracking-widest font-semibold text-primary">Account</span>
<span class="text-[10px] uppercase tracking-widest font-semibold text-on-surface-variant">Profile</span>
<span class="text-[10px] uppercase tracking-widest font-semibold text-on-surface-variant">Done</span>
</div>
<div class="h-[1px] w-full bg-white/10 flex">
<div class="h-full w-1/3 bg-primary-container shadow-[0_0_8px_rgba(108,92,231,0.5)]"></div>
<div class="h-full w-2/3"></div>
</div>
</nav>
<!-- Headline & Subtext -->
<div class="mb-10">
<h1 class="text-headline-lg font-headline-lg text-on-surface mb-3">Join the Collective</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Start your high-performance study journey.</p>
</div>
<!-- Registration Form -->
<form class="space-y-6 max-w-md w-full" onsubmit="return false">
<div class="floating-label-group">
<input id="full_name" placeholder=" " required="" type="text"/>
<label for="full_name">Full Name</label>
</div>
<div class="floating-label-group relative">
<input id="username" oninput="handleUsername(this)" placeholder=" " required="" type="text"/>
<label for="username">Username</label>
<div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 transition-opacity duration-300 pointer-events-none" id="availability_indicator">
<span class="material-symbols-outlined text-secondary-container text-xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<div class="floating-label-group">
<input id="email" placeholder=" " required="" type="email"/>
<label for="email">Email Address</label>
</div>
<div class="space-y-2">
<div class="floating-label-group">
<input id="password" oninput="checkStrength(this.value)" placeholder=" " required="" type="password"/>
<label for="password">Password</label>
</div>
<!-- Strength Meter -->
<div class="flex items-center gap-3 h-4">
<div class="flex gap-1 flex-1">
<div class="h-[2px] flex-1 bg-white/10 transition-colors duration-500" id="bar-1"></div>
<div class="h-[2px] flex-1 bg-white/10 transition-colors duration-500" id="bar-2"></div>
<div class="h-[2px] flex-1 bg-white/10 transition-colors duration-500" id="bar-3"></div>
<div class="h-[2px] flex-1 bg-white/10 transition-colors duration-500" id="bar-4"></div>
</div>
<span class="text-[10px] font-bold uppercase tracking-tighter text-on-surface-variant w-12 text-right opacity-0 transition-opacity" id="strength-label">Weak</span>
</div>
</div>
<div class="floating-label-group">
<input id="confirm_password" placeholder=" " required="" type="password"/>
<label for="confirm_password">Confirm Password</label>
</div>
<button class="w-full bg-primary-container text-white py-4 rounded-lg font-semibold text-body-lg hover:scale-[1.02] active:scale-[0.98] shadow-[0_10px_20px_-10px_rgba(108,92,231,0.5)] transition-all ease-out-expo" type="submit">
                    Create account
                </button>
<p class="text-body-sm text-on-surface-variant text-center">
                    By creating an account, you agree to our <a class="text-primary-container hover:underline transition-colors" href="#">Terms of Service</a> and <a class="text-primary-container hover:underline transition-colors" href="#">Privacy Policy</a>.
                </p>
</form>
<!-- Bottom Action -->
<div class="mt-auto pt-12 text-center md:text-left">
<p class="text-body-sm text-on-surface-variant">
                    Already have an account? <a class="text-primary-container font-semibold hover:underline" href="#">Sign In</a>
</p>
</div>
</section>
<!-- Right Side: Visualization (45%) -->
<section class="hidden md:flex md:w-[45%] h-screen sticky top-0 bg-[#070709] overflow-hidden border-l border-white/5">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(108,92,231,0.05),transparent)] pointer-events-none"></div>
<div class="scroll-container relative w-full h-full flex flex-col items-center">
<div class="scrolling-content w-full px-12 pt-12 space-y-4">
<!-- Duplicate items for seamless loop -->
<div class="space-y-4" id="viz-stream-1"></div>
<div class="space-y-4" id="viz-stream-2"></div>
</div>
</div>
<!-- Data Overlay -->
<div class="absolute bottom-12 left-12 right-12 flex justify-between items-end">
<div class="flex flex-col gap-1">
<span class="text-[10px] uppercase tracking-widest text-secondary-container font-bold">Network Status</span>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-secondary-container animate-pulse"></div>
<span class="text-stats-md font-stats-md text-on-surface">2,481 Live Members</span>
</div>
</div>
<div class="flex flex-col gap-1 text-right">
<span class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Latency</span>
<span class="text-stats-md font-stats-md text-on-surface">14ms</span>
</div>
</div>
</section>
</main>
<script>
        // Username Availability Logic
        function handleUsername(input) {
            const indicator = document.getElementById('availability_indicator');
            if (input.value.length > 3) {
                indicator.classList.remove('opacity-0');
                indicator.classList.add('opacity-100');
                input.parentElement.classList.add('flash-animation');
                setTimeout(() => {
                    input.parentElement.classList.remove('flash-animation');
                }, 600);
            } else {
                indicator.classList.add('opacity-0');
                indicator.classList.remove('opacity-100');
            }
        }

        // Password Strength Logic
        function checkStrength(val) {
            const bars = [
                document.getElementById('bar-1'),
                document.getElementById('bar-2'),
                document.getElementById('bar-3'),
                document.getElementById('bar-4')
            ];
            const label = document.getElementById('strength-label');
            label.style.opacity = val.length > 0 ? '1' : '0';

            // Reset
            bars.forEach(b => b.style.backgroundColor = 'rgba(255,255,255,0.1)');

            if (val.length === 0) {
                label.innerText = 'Weak';
            } else if (val.length < 6) {
                bars[0].style.backgroundColor = '#FF5252';
                label.innerText = 'Weak';
                label.style.color = '#FF5252';
            } else if (val.length < 10) {
                bars[0].style.backgroundColor = '#6C5CE7';
                bars[1].style.backgroundColor = '#6C5CE7';
                label.innerText = 'Good';
                label.style.color = '#6C5CE7';
            } else {
                bars.forEach(b => b.style.backgroundColor = '#00E676');
                label.innerText = 'Strong';
                label.style.color = '#00E676';
            }
        }

        // Live Activity Visualization Population
        const activities = [
            { user: "Alex_P", action: "Completed 2h deep work", type: "Focus" },
            { user: "Sarah.K", action: "Joined Math Collective", type: "Collab" },
            { user: "Devin_99", action: "Ranked #1 in Physics", type: "Perf" },
            { user: "Marcus_V", action: "Started Focus Session", type: "Focus" },
            { user: "Elena_Z", action: "Shared Resource Pack", type: "Collab" },
            { user: "Riley_T", action: "Achieved 7-day streak", type: "Perf" },
            { user: "Jamie_L", action: "Finished Milestone 4", type: "Focus" },
            { user: "Taylor_S", action: "Unlocked Silver Tier", type: "Perf" }
        ];

        function createActivityCard(act) {
            return `
                <div class="hairline-card p-4 w-full flex items-center justify-between group transition-all duration-500 overflow-hidden relative">
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 rounded bg-white/5 border border-white/10 flex items-center justify-center">
                             <span class="material-symbols-outlined text-sm text-on-surface-variant">person</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[11px] font-bold tracking-tight text-on-surface">${act.user}</span>
                            <span class="text-[10px] text-on-surface-variant">${act.action}</span>
                        </div>
                    </div>
                    <div class="text-[9px] uppercase tracking-widest text-primary border border-primary/20 px-2 py-1 rounded">
                        ${act.type}
                    </div>
                    <div class="absolute inset-0 bg-secondary-container/10 opacity-0 group-data-[flash=true]:animate-[flash-settle_800ms_ease-out-expo_forwards]"></div>
                </div>
            `;
        }

        const stream1 = document.getElementById('viz-stream-1');
        const stream2 = document.getElementById('viz-stream-2');

        const html = activities.map(a => createActivityCard(a)).join('');
        stream1.innerHTML = html;
        stream2.innerHTML = html;

        // Random Flash Logic
        setInterval(() => {
            const cards = document.querySelectorAll('.hairline-card');
            const randomCard = cards[Math.floor(Math.random() * cards.length)];
            randomCard.setAttribute('data-flash', 'true');
            setTimeout(() => randomCard.removeAttribute('data-flash'), 1000);
        }, 2000);
    </script>
</body></html>
