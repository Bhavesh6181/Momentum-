<!-- Script for Interactions -->
<script>
        function togglePill(element, group) {
            // Find all buttons in the same parent container (or conceptual group)
            const parent = element.parentElement;
            const buttons = parent.querySelectorAll('.pill-selector');
            
            // Remove active class from all
            buttons.forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Add active class to clicked
            element.classList.add('active');
            
            // Simple haptic-like micro-interaction
            element.style.transform = 'scale(0.96)';
            setTimeout(() => {
                element.style.transform = '';
            }, 100);
        }

        // Initialize state
        window.onload = () => {
            // Default selection simulation
            const firstBranch = document.querySelector('section:first-of-type .pill-selector:first-child');
            if(firstBranch) togglePill(firstBranch, 'branch');
        };
    </script>
