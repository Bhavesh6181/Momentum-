<script>
        // Micro-interactions and timer logic
        function toggleStatus(el) {
            const indicator = document.getElementById('status-indicator');
            const labels = el.querySelectorAll('span');
            
            if (indicator.style.transform === 'translateX(82px)') {
                indicator.style.transform = 'translateX(0)';
                labels[0].classList.add('text-on-primary-container');
                labels[0].classList.remove('text-on-surface-variant');
                labels[1].classList.add('text-on-surface-variant');
                labels[1].classList.remove('text-on-primary-container');
            } else {
                indicator.style.transform = 'translateX(82px)';
                labels[1].classList.add('text-on-primary-container');
                labels[1].classList.remove('text-on-surface-variant');
                labels[0].classList.add('text-on-surface-variant');
                labels[0].classList.remove('text-on-primary-container');
            }
        }

        function dismissFriends() {
            const strip = document.getElementById('friends-strip');
            strip.classList.add('translate-y-full');
        }

        // Circular progress animation (demo logic)
        let progress = 1131 * 0.25; // 75% filled
        const ring = document.getElementById('progress-ring');
        
        // Soft animation for timer counting (visual only)
        let timerSeconds = 1499;
        const timerText = document.querySelector('h1');
        
        setInterval(() => {
            if (timerSeconds > 0) {
                timerSeconds--;
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                timerText.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                // Update ring (25 minute session)
                const total = 25 * 60;
                const offset = 1131 - ((timerSeconds / total) * 1131);
                ring.style.strokeDashoffset = offset;
            }
        }, 1000);
    </script>
