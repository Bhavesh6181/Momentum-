<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --motion-duration-slow: 0.5s;
            --motion-duration-md: 0.3s;
            --motion-duration-fast: 0.15s;
        }

        @keyframes modal-entry {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes flash-settle {
            0% { background-color: rgba(0, 228, 117, 0.3); border-color: #00e475; box-shadow: 0 0 15px rgba(0, 228, 117, 0.4); }
            100% { background-color: transparent; border-color: rgba(255, 255, 255, 0.08); box-shadow: none; }
        }

        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }

        .animate-modal-entry {
            animation: modal-entry var(--motion-duration-slow) var(--ease-out-expo) forwards;
        }

        .animate-flash {
            animation: flash-settle 0.4s var(--ease-out-expo) forwards;
        }

        .ease-out-expo {
            transition-timing-function: var(--ease-out-expo);
        }

        .glass-border {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background-clip: padding-box;
        }

        .top-left-highlight {
            position: relative;
        }

        .top-left-highlight::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .otp-box:focus-within {
            border-color: #c6bfff;
            box-shadow: 0 0 0 1px #c6bfff;
        }

        [data-tab-content] {
            display: none;
        }

        [data-tab-content].active {
            display: block;
        }

        .typewriter-text {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #c6bfff;
            animation: typewriter 1s steps(10, end);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#33343b",
                        "tertiary-fixed-dim": "#ffb77d",
                        "on-surface-variant": "#c8c4d7",
                        "on-surface": "#e3e1ea",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#005226",
                        "primary": "#c6bfff",
                        "surface-tint": "#c6bfff",
                        "on-primary": "#2900a0",
                        "tertiary-container": "#ac5d00",
                        "surface-dim": "#121319",
                        "surface": "#121319",
                        "inverse-surface": "#e3e1ea",
                        "on-error-container": "#ffdad6",
                        "surface-bright": "#383940",
                        "primary-fixed-dim": "#c6bfff",
                        "secondary-fixed-dim": "#00e475",
                        "primary-container": "#6c5ce7",
                        "surface-container": "#1e1f26",
                        "secondary-fixed": "#62ff96",
                        "on-tertiary": "#4d2600",
                        "surface-container-lowest": "#0d0e14",
                        "on-background": "#e3e1ea",
                        "on-tertiary-container": "#fff5f1",
                        "outline": "#928ea0",
                        "on-secondary-fixed": "#00210b",
                        "inverse-primary": "#5847d2",
                        "inverse-on-surface": "#2f3037",
                        "on-tertiary-fixed": "#2f1500",
                        "on-primary-container": "#faf6ff",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "surface-container-highest": "#33343b",
                        "secondary-container": "#05e777",
                        "surface-container-high": "#292a30",
                        "secondary": "#7dffa2",
                        "background": "#121319",
                        "on-primary-fixed-variant": "#4029ba",
                        "on-primary-fixed": "#160066",
                        "primary-fixed": "#e4dfff",
                        "outline-variant": "#474554",
                        "on-secondary-container": "#00622e",
                        "on-secondary": "#003918",
                        "surface-container-low": "#1a1b21",
                        "tertiary-fixed": "#ffdcc3",
                        "tertiary": "#ffb77d",
                        "error": "#ffb4ab",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "margin-desktop": "48px",
                        "unit": "8px",
                        "section-gap-v": "80px"
                    },
                    "fontFamily": {
                        "stats-md": ["JetBrains Mono"],
                        "headline-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "stats-md": ["18px", {"lineHeight": "1", "letterSpacing": "0em", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-md": ["20px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface overflow-hidden font-body-lg text-body-lg">
<!-- Mock Dashboard Backdrop -->
<main class="fixed inset-0 p-margin-desktop grid grid-cols-12 gap-gutter opacity-50 blur-[8px] brightness-[0.4] scale-[0.98] pointer-events-none">
<aside class="col-span-3 flex flex-col gap-unit">
<div class="h-64 bg-surface-container-low glass-border rounded-xl"></div>
<div class="h-full bg-surface-container-low glass-border rounded-xl"></div>
</aside>
<div class="col-span-9 flex flex-col gap-gutter">
<div class="grid grid-cols-3 gap-gutter h-40">
<div class="bg-surface-container-low glass-border rounded-xl"></div>
<div class="bg-surface-container-low glass-border rounded-xl"></div>
<div class="bg-surface-container-low glass-border rounded-xl"></div>
</div>
<div class="bg-surface-container-low glass-border rounded-xl h-full"></div>
</div>
</main>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 backdrop-blur-[12px]" id="modal-overlay">
<div class="w-full max-w-[520px] bg-[#131318] glass-border rounded-xl shadow-2xl flex flex-col overflow-hidden top-left-highlight animate-modal-entry" id="modal-content">
<!-- Modal Header / Tabs -->
<div class="relative flex items-center px-8 pt-8">
<div class="flex gap-8 border-b border-white/5 w-full relative">
<button class="pb-4 font-label-caps text-label-caps uppercase tracking-widest text-primary transition-colors duration-300 relative z-10" onclick="switchTab('create', event)">
                    Create
                </button>
<button class="pb-4 font-label-caps text-label-caps uppercase tracking-widest text-on-surface-variant hover:text-on-surface transition-colors duration-300 relative z-10" onclick="switchTab('join', event)">
                    Join
                </button>
<!-- Sliding Indicator -->
<div class="absolute bottom-[-1px] left-0 h-[2px] bg-primary w-14 transition-all duration-500 ease-out-expo" id="tab-indicator"></div>
</div>
<button class="absolute top-8 right-8 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-8 pb-32">
<!-- Create Tab Content -->
<div class="active space-y-6" data-tab-content="" id="tab-create">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant">Group Name</label>
<input class="w-full bg-surface-container-lowest border border-white/10 rounded-lg px-4 py-3 text-body-lg font-body-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all duration-300 placeholder:text-on-surface-variant/30" id="group-name-input" placeholder="e.g. Quantum Physics 101" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant">Description</label>
<textarea class="w-full bg-surface-container-lowest border border-white/10 rounded-lg px-4 py-3 text-body-lg font-body-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all duration-300 placeholder:text-on-surface-variant/30 resize-none" placeholder="Define the research goals and focus areas..." rows="3"></textarea>
</div>
<div class="flex items-center justify-between py-2">
<div class="space-y-0.5">
<span class="font-headline-md text-headline-md text-on-surface block">Privacy Mode</span>
<span class="text-body-sm font-body-sm text-on-surface-variant">Only approved members can view assets.</span>
</div>
<!-- Custom Toggle -->
<button class="group relative w-12 h-6 rounded-full bg-surface-container-highest transition-all duration-500 overflow-hidden" id="privacy-toggle">
<div class="absolute inset-0 bg-primary opacity-0 group-[.active]:opacity-100 transition-opacity duration-500"></div>
<div class="absolute top-1 left-1 w-4 h-4 rounded-full bg-on-surface transition-transform duration-500 group-[.active]:translate-x-6 z-10 shadow-sm"></div>
</button>
</div>
<div class="pt-4 border-t border-white/5 space-y-3">
<label class="font-label-caps text-label-caps text-on-surface-variant">Generated Invite Code</label>
<div class="flex items-center justify-between bg-surface-container-low px-4 py-4 rounded-lg glass-border group">
<div class="overflow-hidden">
<code class="font-stats-md text-stats-md tracking-[0.2em] text-primary" id="invite-code">QUANTUM-00</code>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">content_copy</span>
</button>
</div>
</div>
</div>
<!-- Join Tab Content -->
<div class="space-y-8" data-tab-content="" id="tab-join">
<div class="text-center space-y-2">
<h2 class="font-headline-md text-headline-md text-on-surface">Enter Activation Code</h2>
<p class="text-body-sm font-body-sm text-on-surface-variant">Request a 6-digit access key from the laboratory head.</p>
</div>
<div class="flex justify-between items-center gap-2 max-w-sm mx-auto" id="otp-container">
<input class="otp-box w-12 h-14 bg-surface-container-lowest border border-white/10 rounded-lg text-center font-stats-md text-stats-md text-secondary-fixed focus:outline-none transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-box w-12 h-14 bg-surface-container-lowest border border-white/10 rounded-lg text-center font-stats-md text-stats-md text-secondary-fixed focus:outline-none transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-box w-12 h-14 bg-surface-container-lowest border border-white/10 rounded-lg text-center font-stats-md text-stats-md text-secondary-fixed focus:outline-none transition-all duration-200" maxlength="1" type="text"/>
<div class="w-2 h-[2px] bg-white/20"></div>
<input class="otp-box w-12 h-14 bg-surface-container-lowest border border-white/10 rounded-lg text-center font-stats-md text-stats-md text-secondary-fixed focus:outline-none transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-box w-12 h-14 bg-surface-container-lowest border border-white/10 rounded-lg text-center font-stats-md text-stats-md text-secondary-fixed focus:outline-none transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-box w-12 h-14 bg-surface-container-lowest border border-white/10 rounded-lg text-center font-stats-md text-stats-md text-secondary-fixed focus:outline-none transition-all duration-200" maxlength="1" type="text"/>
</div>
<div class="flex justify-center">
<button class="text-body-sm font-body-sm text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">info</span>
                        Where do I find my code?
                    </button>
</div>
</div>
</div>
<!-- CTA Footer -->
<div class="absolute bottom-0 left-0 w-full p-8 bg-[#131318]/80 backdrop-blur-md border-t border-white/5">
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-lg font-headline-md text-headline-md font-bold hover:brightness-110 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-primary-container/30 active:scale-[0.98] transition-all duration-300 ease-out-expo shadow-lg shadow-primary-container/20" id="main-cta">
                Create Group
            </button>
</div>
</div>
</div>
<!-- Background Lighting Effect -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] pointer-events-none rounded-full"></div>
<script>
    function switchTab(tab, event) {
        const indicator = document.getElementById('tab-indicator');
        const cta = document.getElementById('main-cta');
        const buttons = event.currentTarget.parentElement.querySelectorAll('button');
        
        // UI States
        buttons.forEach(btn => btn.classList.replace('text-primary', 'text-on-surface-variant'));
        event.currentTarget.classList.replace('text-on-surface-variant', 'text-primary');
        
        // Indicator Logic with Transform
        const offsetLeft = event.currentTarget.offsetLeft;
        const width = event.currentTarget.offsetWidth;
        indicator.style.transform = `translateX(${offsetLeft}px)`;
        indicator.style.width = `${width}px`;

        // Content Visibility
        document.querySelectorAll('[data-tab-content]').forEach(content => {
            content.classList.remove('active');
        });
        document.getElementById(`tab-${tab}`).classList.add('active');

        // Update CTA text
        cta.textContent = tab === 'create' ? 'Create Group' : 'Join Group';
    }

    // Toggle logic
    const privacyToggle = document.getElementById('privacy-toggle');
    privacyToggle.addEventListener('click', () => {
        privacyToggle.classList.toggle('active');
    });

    // Typewriter Effect for Invite Code
    const nameInput = document.getElementById('group-name-input');
    const codeDisplay = document.getElementById('invite-code');
    let typewriterTimeout;
    
    nameInput.addEventListener('input', (e) => {
        const val = e.target.value;
        const prefix = val.split(' ')[0].toUpperCase() || 'QUANTUM';
        const suffix = Math.floor(Math.random() * 90 + 10);
        const finalCode = `${prefix.slice(0, 8)}-${suffix}`;

        clearTimeout(typewriterTimeout);
        codeDisplay.textContent = '';
        codeDisplay.classList.remove('typewriter-text');
        void codeDisplay.offsetWidth; // Reflow
        
        let i = 0;
        const speed = 50;
        
        function type() {
            if (i < finalCode.length) {
                codeDisplay.textContent += finalCode.charAt(i);
                i++;
                typewriterTimeout = setTimeout(type, speed);
            }
        }
        type();
    });

    // OTP Input Logic & Signal-Green Flash Effect
    const otpInputs = document.querySelectorAll('.otp-box');
    otpInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1) {
                // Kinetic Flash effect
                input.classList.remove('animate-flash');
                void input.offsetWidth; // trigger reflow
                input.classList.add('animate-flash');
                
                // Move focus to next input
                if (index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            }
        });

        input.addEventListener('keydown', (e) => {
            // Delete key logic
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                otpInputs[index - 1].focus();
            }
        });

        // Paste support
        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const data = e.clipboardData.getData('text').slice(0, 6).split('');
            data.forEach((char, i) => {
                if (otpInputs[index + i]) {
                    otpInputs[index + i].value = char;
                    otpInputs[index + i].classList.add('animate-flash');
                }
            });
            if (otpInputs[index + data.length]) otpInputs[index + data.length].focus();
            else if (otpInputs[5]) otpInputs[5].focus();
        });
    });

    // Initial setup
    window.onload = () => {
        const firstTab = document.querySelector('[onclick*="create"]');
        const indicator = document.getElementById('tab-indicator');
        indicator.style.width = `${firstTab.offsetWidth}px`;
        indicator.style.transform = `translateX(${firstTab.offsetLeft}px)`;
    };
</script>
</body></html>
