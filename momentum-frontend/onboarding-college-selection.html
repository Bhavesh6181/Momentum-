<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Momentum | College Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#c6bfff",
                    "on-primary-fixed": "#160066",
                    "background": "#121319",
                    "surface-variant": "#33343b",
                    "surface-bright": "#383940",
                    "error-container": "#93000a",
                    "inverse-surface": "#e3e1ea",
                    "on-tertiary-fixed-variant": "#6e3900",
                    "on-background": "#e3e1ea",
                    "on-tertiary-fixed": "#2f1500",
                    "primary": "#c6bfff",
                    "surface": "#121319",
                    "outline-variant": "#474554",
                    "surface-container-lowest": "#0d0e14",
                    "surface-container-highest": "#33343b",
                    "surface-container-low": "#1a1b21",
                    "surface-container": "#1e1f26",
                    "tertiary": "#ffb77d",
                    "on-primary-fixed-variant": "#4029ba",
                    "inverse-on-surface": "#2f3037",
                    "tertiary-fixed": "#ffdcc3",
                    "primary-fixed-dim": "#c6bfff",
                    "surface-container-high": "#292a30",
                    "on-secondary": "#003918",
                    "outline": "#928ea0",
                    "on-error": "#690005",
                    "on-surface-variant": "#c8c4d7",
                    "on-secondary-container": "#00622e",
                    "primary-container": "#6c5ce7",
                    "surface-dim": "#121319",
                    "tertiary-fixed-dim": "#ffb77d",
                    "secondary-container": "#05e777",
                    "on-tertiary": "#4d2600",
                    "on-secondary-fixed-variant": "#005226",
                    "inverse-primary": "#5847d2",
                    "error": "#ffb4ab",
                    "on-tertiary-container": "#fff5f1",
                    "secondary-fixed-dim": "#00e475",
                    "secondary": "#7dffa2",
                    "tertiary-container": "#ac5d00",
                    "secondary-fixed": "#62ff96",
                    "on-primary-container": "#faf6ff",
                    "on-primary": "#2900a0",
                    "primary-fixed": "#e4dfff",
                    "on-secondary-fixed": "#00210b",
                    "on-surface": "#e3e1ea",
                    "on-error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "section-gap-v": "80px",
                    "margin-desktop": "48px",
                    "margin-mobile": "16px",
                    "gutter": "24px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "stats-md": ["JetBrains Mono"],
                    "label-caps": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "display-lg": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {

                    "stats-md": ["18px", {"lineHeight": "1", "letterSpacing": "0em", "fontWeight": "500"}],

                    "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0A0A0D;
            color: #e3e1ea;
            overflow-x: hidden;
        }

        .ease-out-expo {
            transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hairline-border {
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-surface {
            background: #131318;
            backdrop-filter: blur(12px);
        }

        .progress-line-container {
            height: 2px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .progress-line-active {
            height: 100%;
            width: 20%;
            background: #6c5ce7;
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.5);
        }

        .slide-in {
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(40px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .interactive-pill {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .interactive-pill:hover {
            background-color: #6c5ce7;
            border-color: #6c5ce7;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-background selection:bg-primary-container selection:text-white">
<!-- Progress Bar -->
<div class="progress-line-container">
<div class="progress-line-active"></div>
</div>
<!-- Main Content Shell -->
<main class="relative min-h-screen flex flex-col justify-center items-center px-margin-mobile md:px-margin-desktop overflow-hidden">
<!-- Subtle Animated Background -->

<div class="z-10 w-full max-w-3xl slide-in">
<!-- Headline Section -->
<div class="mb-12">
<span class="font-label-caps text-label-caps text-primary tracking-widest block mb-4 uppercase">Onboarding 01</span>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight leading-none">
                    Where are you studying?
                </h1>
</div>
<!-- Search Interface -->
<div class="space-y-8">
<div class="relative group">
<div class="absolute inset-y-0 left-6 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors duration-300">
<span class="material-symbols-outlined text-2xl">search</span>
</div>
<input class="w-full bg-[#131318] hairline-border rounded-xl py-6 pl-16 pr-6 font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/30 transition-all duration-300 ease-out-expo shadow-2xl" placeholder="Search for your university..." type="text"/>
<div class="absolute inset-y-0 right-6 flex items-center text-on-surface-variant/30 text-xs font-stats-md tracking-tighter pointer-events-none">
                        PRESS ENTER ↵
                    </div>
</div>
<!-- Autocomplete Pills -->
<div class="flex flex-wrap gap-3 items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant mr-2">SUGGESTIONS</span>
<button class="interactive-pill hairline-border px-5 py-2.5 rounded-full font-body-sm text-body-sm text-on-surface-variant bg-surface-container-low hover:shadow-[0_0_20px_rgba(108,92,231,0.2)]">
                        Stanford University
                    </button>
<button class="interactive-pill hairline-border px-5 py-2.5 rounded-full font-body-sm text-body-sm text-on-surface-variant bg-surface-container-low hover:shadow-[0_0_20px_rgba(108,92,231,0.2)]">
                        MIT
                    </button>
<button class="interactive-pill hairline-border px-5 py-2.5 rounded-full font-body-sm text-body-sm text-on-surface-variant bg-surface-container-low hover:shadow-[0_0_20px_rgba(108,92,231,0.2)]">
                        IIT Bombay
                    </button>
<button class="interactive-pill hairline-border px-5 py-2.5 rounded-full font-body-sm text-body-sm text-on-surface-variant bg-surface-container-low hover:shadow-[0_0_20px_rgba(108,92,231,0.2)]">
                        Oxford
                    </button>
</div>
</div>
<!-- Footer Navigation -->
<div class="mt-24 pt-8 border-t border-white/5 flex justify-between items-center">
<button class="group flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors font-body-sm text-body-sm">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform ease-out-expo">arrow_back</span>
                    Back
                </button>
<div class="flex items-center gap-8">
<div class="hidden md:flex flex-col items-end">
<span class="text-on-surface-variant font-label-caps text-[10px] tracking-widest">ESTIMATED TIME</span>
<span class="text-on-surface font-stats-md text-stats-md">2 MIN LEFT</span>
</div>
<button class="bg-primary-container text-white px-8 py-4 rounded-xl font-headline-md text-headline-md hover:brightness-110 active:scale-95 transition-all ease-out-expo flex items-center gap-3 group shadow-xl">
                        Continue
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform ease-out-expo">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Atmospheric Design Elements -->
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute -top-24 -right-24 w-64 h-64 bg-tertiary-container/5 blur-[100px] rounded-full"></div>
</main>
<script>
        // Micro-interactions for input focus
        const inputField = document.querySelector('input');
        const container = document.querySelector('.slide-in');

        inputField.addEventListener('focus', () => {
            // Subtle shift on focus
            container.style.transform = 'translateY(-4px)';
        });

        inputField.addEventListener('blur', () => {
            container.style.transform = 'translateY(0)';
        });

        // Simulating the "flash then settle" on interaction for pills
        const pills = document.querySelectorAll('.interactive-pill');
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pill.style.backgroundColor = '#05e777'; // Signal Green
                pill.style.borderColor = '#05e777';
                pill.style.color = '#003918';
                
                setTimeout(() => {
                    pill.style.backgroundColor = '#6c5ce7'; // Settle to Indigo
                    pill.style.borderColor = '#6c5ce7';
                    pill.style.color = '#ffffff';
                }, 300);
            });
        });
    </script>
</body></html>
