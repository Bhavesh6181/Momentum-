name: CI — Test & Docker Build

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      # Real Redis for integration tests that use it
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: momentum-backend
        run: chmod +x gradlew

      - name: Run tests
        working-directory: momentum-backend
        run: ./gradlew clean test --no-daemon
        env:
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: momentum-backend/build/reports/tests/test/

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validate only, no push)
        uses: docker/build-push-action@v5
        with:
          context: momentum-backend
          file: momentum-backend/Dockerfile
          push: false
          tags: momentum-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
