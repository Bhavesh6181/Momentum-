<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Momentum | Connect Profiles</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#c6bfff",
                    "on-primary-fixed": "#160066",
                    "background": "#121319",
                    "surface-variant": "#33343b",
                    "surface-bright": "#383940",
                    "error-container": "#93000a",
                    "inverse-surface": "#e3e1ea",
                    "on-tertiary-fixed-variant": "#6e3900",
                    "on-background": "#e3e1ea",
                    "on-tertiary-fixed": "#2f1500",
                    "primary": "#c6bfff",
                    "surface": "#121319",
                    "outline-variant": "#474554",
                    "surface-container-lowest": "#0d0e14",
                    "surface-container-highest": "#33343b",
                    "surface-container-low": "#1a1b21",
                    "surface-container": "#1e1f26",
                    "tertiary": "#ffb77d",
                    "on-primary-fixed-variant": "#4029ba",
                    "inverse-on-surface": "#2f3037",
                    "tertiary-fixed": "#ffdcc3",
                    "primary-fixed-dim": "#c6bfff",
                    "surface-container-high": "#292a30",
                    "on-secondary": "#003918",
                    "outline": "#928ea0",
                    "on-error": "#690005",
                    "on-surface-variant": "#c8c4d7",
                    "on-secondary-container": "#00622e",
                    "primary-container": "#6c5ce7",
                    "surface-dim": "#121319",
                    "tertiary-fixed-dim": "#ffb77d",
                    "secondary-container": "#05e777",
                    "on-tertiary": "#4d2600",
                    "on-secondary-fixed-variant": "#005226",
                    "inverse-primary": "#5847d2",
                    "error": "#ffb4ab",
                    "on-tertiary-container": "#fff5f1",
                    "secondary-fixed-dim": "#00e475",
                    "secondary": "#7dffa2",
                    "tertiary-container": "#ac5d00",
                    "secondary-fixed": "#62ff96",
                    "on-primary-container": "#faf6ff",
                    "on-primary": "#2900a0",
                    "primary-fixed": "#e4dfff",
                    "on-secondary-fixed": "#00210b",
                    "on-surface": "#e3e1ea",
                    "on-error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "section-gap-v": "80px",
                    "margin-desktop": "48px",
                    "margin-mobile": "16px",
                    "gutter": "24px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "stats-md": ["JetBrains Mono"],
                    "label-caps": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "display-lg": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["20px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                    "stats-md": ["18px", {"lineHeight": "1", "letterSpacing": "0em", "fontWeight": "500"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0A0A0D;
            color: #e3e1ea;
            overflow-x: hidden;
        }

        .ease-out-expo {
            transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hairline-border {
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-focus-transition {
            transition: border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-focus-transition:focus {
            border-color: #c6bfff;
            outline: none;
        }

        .slide-in {
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(40px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .progress-glow {
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.4);
        }

        .glass-card {
            background: #131318;
            position: relative;
        }

        .glass-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1px solid transparent;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Progress Indicator -->
<div class="fixed top-0 left-0 w-full h-1 bg-surface-container-highest z-50">
<div class="h-full bg-primary-container progress-glow transition-all duration-1000 ease-out-expo" style="width: 80%;"></div>
</div>
<main class="w-full max-w-2xl slide-in">
<header class="mb-12">
<h1 class="font-display-lg text-display-lg text-on-surface mb-4">
                Connect your profiles
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg">
                Link your professional networks to showcase your achievements and collaborate with the Momentum community.
            </p>
</header>
<section class="space-y-gutter">
<!-- GitHub Field -->
<div class="group">
<div class="flex justify-between items-end mb-3">
<label class="font-label-caps text-label-caps text-on-surface flex items-center gap-2" for="github">
<span class="material-symbols-outlined text-[18px]">terminal</span>
                        GITHUB URL
                    </label>
<span class="font-body-sm text-body-sm text-[#8B8B93]">Optional</span>
</div>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-low hairline-border rounded-lg font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant input-focus-transition" id="github" placeholder="https://github.com/username" type="url"/>
</div>
</div>
<!-- LinkedIn Field -->
<div class="group">
<div class="flex justify-between items-end mb-3">
<label class="font-label-caps text-label-caps text-on-surface flex items-center gap-2" for="linkedin">
<span class="material-symbols-outlined text-[18px]">work</span>
                        LINKEDIN URL
                    </label>
<span class="font-body-sm text-body-sm text-[#8B8B93]">Optional</span>
</div>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-low hairline-border rounded-lg font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant input-focus-transition" id="linkedin" placeholder="https://linkedin.com/in/username" type="url"/>
</div>
</div>
<!-- Hint/Security Note -->
<div class="pt-4 flex items-start gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<p class="font-body-sm text-body-sm leading-relaxed">
                    Momentum only uses these links for your public profile. We never post on your behalf or share your private data.
                </p>
</div>
</section>
<!-- Form Actions -->
<footer class="mt-section-gap-v flex flex-col md:flex-row items-center justify-between gap-gutter">
<button class="w-full md:w-auto font-label-caps text-label-caps text-on-surface-variant hover:text-on-surface px-8 py-4 transition-colors duration-300 ease-out-expo order-2 md:order-1">
                SKIP FOR NOW
            </button>
<button class="w-full md:w-auto group flex items-center justify-center gap-3 bg-primary-container text-on-primary-container px-10 py-4 rounded-full font-headline-md text-headline-md hover:brightness-110 active:scale-95 transition-all duration-300 ease-out-expo order-1 md:order-2">
                CONTINUE
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform duration-300">arrow_forward</span>
</button>
</footer>
</main>
<!-- Ambient Visual Element -->
<div class="fixed -bottom-32 -right-32 w-[600px] h-[600px] pointer-events-none opacity-20">

</div>
<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                const label = input.closest('.group').querySelector('label');
                label.classList.add('text-primary');
                label.classList.remove('text-on-surface');
            });
            input.addEventListener('blur', () => {
                const label = input.closest('.group').querySelector('label');
                label.classList.remove('text-primary');
                label.classList.add('text-on-surface');
            });
        });

        // Horizontal slide navigation simulation
        const continueBtn = document.querySelector('button.bg-primary-container');
        continueBtn.addEventListener('click', (e) => {
            document.body.style.transition = 'transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease';
            document.body.style.transform = 'translateX(-100px)';
            document.body.style.opacity = '0';
            setTimeout(() => {
                // Logic for next step would go here
                console.log('Navigating to next step...');
            }, 800);
        });
    </script>
</body></html>
