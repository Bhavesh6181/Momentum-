spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://dev-db-host:5432/momentum}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:dev-redis-host}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.momentum.backend: DEBUG
