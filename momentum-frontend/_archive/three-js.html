<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_8 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_8" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_8');
  const devicePixelRatio = window.devicePixelRatio || 1;
  // Momentum Live Activity Feed - Vertical Auto-scroll with Flash-then-Settle Motif
const container = document.querySelector('.activity-feed-container');
const cardData = [
  { user: 'Alex R.', action: 'started "Neural Networks"', time: 'Just now' },
  { user: 'Sarah C.', action: 'reached 4h streak', time: '2m ago' },
  { user: 'James W.', action: 'joined CS-402', time: '5m ago' },
  { user: 'Maria G.', action: 'completed "AI Ethics"', time: '8m ago' },
  { user: 'Elena V.', action: 'started "Discrete Math"', time: '12m ago' },
  { user: 'Marcus K.', action: 'earned "Deep Diver"', time: '15m ago' }
];

function createCard(data) {
  const card = document.createElement('div');
  card.className = 'w-full p-4 mb-4 bg-[#131318] border border-white/10 rounded-sm opacity-0 transform translate-y-4 transition-all duration-700 ease-out-expo';
  card.innerHTML = `
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-[#00E676] animate-pulse"></div>
      <div class="flex-1">
        <p class="text-[13px] text-[#F5F5F7] font-medium leading-tight">${data.user} <span class="text-[#8B8B93] font-normal">${data.action}</span></p>
        <p class="text-[11px] text-[#8B8B93] mt-1 uppercase tracking-wider">${data.time}</p>
      </div>
    </div>
  `;
  return card;
}

function initFeed() {
  const feed = document.createElement('div');
  feed.className = 'flex flex-col gap-4 animate-scroll-up';
  container.appendChild(feed);

  // Initial cards
  cardData.forEach(data => feed.appendChild(createCard(data)));

  // Animation logic for adding new cards
  setInterval(() => {
    const data = cardData[Math.floor(Math.random() * cardData.length)];
    const card = createCard(data);
    feed.prepend(card);

    // Flash then settle effect
    setTimeout(() => {
      card.style.backgroundColor = '#00E676'; // Flash
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
      
      setTimeout(() => {
        card.style.transition = 'background-color 1.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.7s ease, transform 0.7s ease';
        card.style.backgroundColor = '#131318'; // Settle
      }, 100);
    }, 50);

    if (feed.children.length > 10) feed.lastElementChild.remove();
  }, 3000);
}

// Add required CSS for the scroll animation
const style = document.createElement('style');
style.textContent = `
  @keyframes scroll-up {
    from { transform: translateY(0); }
    to { transform: translateY(-50%); }
  }
  .animate-scroll-up {
    animation: scroll-up 60s linear infinite;
  }
  .ease-out-expo {
    transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
  }
`;
document.head.appendChild(style);

initFeed();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_8 -->
</body>
</html>
